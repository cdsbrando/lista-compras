<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#555555">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lista">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f5f5f5; color: #222; }
  .app { max-width: 600px; margin: 0 auto; padding: 16px; }

  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; }
  .app-title { font-size: 24px; font-weight: 300; color: #555; letter-spacing: 1px; }
  .progress { font-size: 12px; color: #bbb; font-weight: 300; letter-spacing: 0.5px; }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; justify-content: flex-end; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1.5px solid #eee; color: #bbb; background: #fff; cursor: pointer; font-weight: 300; letter-spacing: 0.5px; }
  .filter-btn.active { border-color: #888; color: #555; font-weight: 400; }

  .category-block { margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: #fff; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #fff; }
  .cat-name { font-size: 16px; font-weight: 700; }
  .cat-count { font-size: 11px; color: #bbb; }
  .cat-body { padding: 2px 0 6px; background: #fff; }

  .item-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #f8f8f8; cursor: pointer; user-select: none; }
  .item-row:last-child { border-bottom: none; }

  .item-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ddd; background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: background 0.15s; }
  .item-check.na-lista { border: none; color: #fff; }
  .item-check.comprado { border: none; color: #fff; background: #bbb; }

  .item-label { flex: 1; font-size: 15px; color: #333; line-height: 1.3; }
  .item-label.comprado { color: #bbb; text-decoration: line-through; }

  .qty-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #eee; background: #f9f9f9; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #888; }
  .qty-btn:hover { background: #efefef; }
  .qty-btn:disabled { opacity: 0.2; pointer-events: none; }
  .qty-val { min-width: 52px; text-align: center; font-size: 13px; font-weight: 600; }
  .qty-dash { min-width: 52px; text-align: center; font-size: 13px; color: #ddd; }

  .item-del { font-size: 14px; color: #ddd; cursor: pointer; padding: 0 3px; opacity: 0; flex-shrink: 0; }
  .item-row:hover .item-del { opacity: 1; }

  .add-row { display: flex; gap: 6px; margin: 6px 14px 4px; }
  .add-input { flex: 1; font-size: 13px; padding: 6px 10px; border-radius: 7px; border: 1px solid #eee; background: #fafafa; color: #222; }
  .add-input:focus { outline: none; border-color: #bbb; }
  .add-btn { font-size: 13px; padding: 6px 12px; border-radius: 7px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #888; }
  .add-btn:hover { background: #f5f5f5; }

  .bottom-btns { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .export-btn { width: 100%; font-size: 14px; font-weight: 500; padding: 12px; border-radius: 10px; border: none; color: #fff; background: #555; cursor: pointer; letter-spacing: 0.5px; }
  .export-btn:hover { background: #444; }
  .new-week-btn { width: 100%; font-size: 13px; padding: 10px; border-radius: 10px; border: 1.5px solid #bbb; color: #888; background: #fff; cursor: pointer; }
  .new-week-btn:hover { background: #f5f5f5; }
  .clear-btn { width: 100%; font-size: 13px; padding: 10px; border-radius: 10px; border: 1px solid #e88; color: #c44; background: #fff; cursor: pointer; }
  .clear-btn:hover { background: #fff0f0; }

  .sync-bar { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 11px; color: #bbb; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; flex-shrink: 0; }
  .pulse.offline { background: #f44; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hint { font-size: 10px; color: #ccc; text-align: center; margin-top: 8px; letter-spacing: 0.3px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 90vw; }
  .toast.show { opacity: 1; }

  .export-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .export-modal.open { display: flex; }
  .export-box { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
  .export-title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 12px; }
  .export-text { font-size: 13px; color: #555; white-space: pre-wrap; line-height: 1.8; background: #f9f9f9; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .export-copy { width: 100%; padding: 12px; background: #555; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
  .export-close { width: 100%; padding: 10px; background: transparent; color: #aaa; border: none; font-size: 13px; cursor: pointer; margin-top: 6px; }

  .loading { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="app-title">Lista de Compras</div>
    <div class="progress" id="progress">Carregando...</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="window.setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="window.setFilter('selecionados',this)">Selecionados</button>
    <button class="filter-btn" onclick="window.setFilter('pendentes',this)">Pendentes</button>
  </div>

  <div id="categories-container"><div class="loading">Conectando...</div></div>

  <div class="bottom-btns">
    <button class="export-btn" onclick="window.exportList()">Exportar lista selecionada</button>
    <button class="clear-btn" onclick="window.clearAll()">Limpar lista</button>
  </div>
  <div class="hint">toque 1x → na lista · toque 2x → comprado · toque 3x → remove</div>
  <div class="sync-bar"><span class="pulse" id="pulse"></span><span id="sync-label">Sincronizando...</span></div>
</div>

<div class="export-modal" id="export-modal">
  <div class="export-box">
    <div class="export-title">Lista selecionada</div>
    <div class="export-text" id="export-text"></div>
    <button class="export-copy" onclick="window.copyExport()">Copiar lista</button>
    <button class="export-close" onclick="document.getElementById('export-modal').classList.remove('open')">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

const UN = 'un', KG = 'kg', LT = 'L';

const CATEGORIES = [
  { id:'frutas', label:'Frutas', color:'#F5A623', textColor:'#7A5000', items:[

  ]},

  ]},

    ['Amido de milho','kg'],['Arroz branco','kg1'],['Arroz integral','kg500'],['Arroz multigrãos','kg500'],
    ['Arroz negro','kg500'],['Aveia em flocos','kg500'],['Aveia flocos finos','kg500'],['Bifum','un'],

    ['Maionese vegana','un'],['Mel','un'],['Molho de tomate','un'],['Molho inglês','un'],

  ]},

    ['Cera Limpa Vinílico Bellinzoni (Leroy Merlin)','un'],['Cif cremoso','un'],
    ['Detergente neutro','un'],['Esponja lavar louça','un'],['Esponja mágica','un'],
    ['Pastilha máquina de lavar roupa','un'],['Perfex','un'],['Sabão de coco em pó','un'],
    ['Sabão de coco líquido','un'],['Sabão em pó lava roupa','un'],['Sabão lava louças','un'],
    ['Sabão líquido lava roupa','un'],['Saco branco de pia/banheiro','un'],
    ['Saco de lixo preto 50L','un'],['Secante lava-louças','un'],['Vanish','un'],
    ['Vinagre de álcool de limpeza (amazon)','un']
  ]},
  { id:'outros', label:'Outros', color:'#aaa', textColor:'#555', items:[] },

function getStep(u) {
  if(u==='kg'||u==='KG') return 100;
  if(u==='kg500') return 500;
  if(u==='kg1') return 1000;
  if(u==='g50') return 50;
  if(u==='L'||u==='LT') return 0.5;
  if(u==='L1') return 1;
  if(u==='meia') return 0.5;
  return 1;
}
function getInitial(u) {
  if(u==='kg'||u==='KG') return 100;
  if(u==='kg500') return 500;
  if(u==='kg1') return 1000;
  if(u==='g50') return 50;
  if(u==='L'||u==='LT') return 0.5;
  if(u==='L1') return 1;
  if(u==='meia') return 0.5;
  return 1;
}
function formatQty(v,u) {
  if(u==='kg'||u==='KG'||u==='kg500'||u==='kg1') return v>=1000?(v/1000).toFixed(v%1000===0?0:1)+' kg':v+' g';
  if(u==='g50') return v+' g';
  if(u==='L'||u==='LT'||u==='L1') return parseFloat(v).toFixed(1).replace(/\.0$/,'')+' L';
  if(u==='meia') return parseFloat(v).toFixed(1).replace(/\.0$/,'')+' un';
  if(u==='bdj') return v+' bdj';
  if(u==='pcte') return v+' pcte';
  return v+' un';
}

let state = { checked:{}, qty:{}, extra:{} };
let currentFilter = 'todos';
let saving = false;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

async function saveState() {
  if(saving) return;
  saving = true;
  try {
    await setDoc(DOC_REF, state);
    document.getElementById('sync-label').textContent = 'Sincronizado em tempo real';
    document.getElementById('pulse').classList.remove('offline');
  } catch(e) {
    document.getElementById('sync-label').textContent = 'Erro ao sincronizar';
    document.getElementById('pulse').classList.add('offline');
  }
  saving = false;
}

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
};

window.toggleItem = function(catId, item, unit) {
  const key = catId+'::'+item;
  const cur = state.checked[key] || 0;
  const next = (cur + 1) % 3;
  if(next === 0) {
    delete state.checked[key];
    delete state.qty[key];
  } else {
    state.checked[key] = next;
    if(next === 1 && !state.qty[key]) state.qty[key] = getInitial(unit);
  }
  saveState(); render();
};

window.changeQty = function(catId, item, unit, dir) {
  const key = catId+'::'+item;
  const step = getStep(unit);
  const cur = state.qty[key] || getInitial(unit);
  let next;
  if(unit==='L'||unit==='LT'||unit==='L1'||unit==='meia') next = Math.max(step, parseFloat((parseFloat(cur)+dir*step).toFixed(1)));
  else next = Math.max(step, Math.round((cur+dir*step)*10)/10);
  state.qty[key] = next;
  if(!state.checked[key]) state.checked[key] = 1;
  saveState(); render();
};

window.addItem = function(catId) {
  const input = document.getElementById('add-'+catId);
  if(!input) return;
  const val = input.value.trim();
  if(!val) return;
  if(!state.extra[catId]) state.extra[catId] = [];
  state.extra[catId].push(val);
  input.value = '';
  saveState(); render();
};

window.deleteItem = function(catId, item) {
  const key = catId+'::'+item;
  state.extra[catId] = (state.extra[catId]||[]).filter(i=>i!==item);
  delete state.checked[key]; delete state.qty[key];
  saveState(); render();
};

window.clearAll = function() {
  if(!confirm('Limpar toda a lista? Isso vai apagar seleção, quantidades e itens extras.')) return;
  state.checked={}; state.qty={}; state.extra={};
  saveState(); render();
};

window.exportList = function() {
  let lines = ['LISTA DE COMPRAS\n'];
  CATEGORIES.forEach(cat => {
    const baseItems = cat.items;
    const extraItems = (state.extra[cat.id]||[]).map(n=>[n,'un']);
    const allItems = [...baseItems, ...extraItems];
    const selected = allItems.filter(([n])=>{
      const v = state.checked[cat.id+'::'+n];
      return v === 1 || v === 2;
    });
    if(selected.length === 0) return;
    lines.push(cat.label.toUpperCase());
    selected.forEach(([item, unit]) => {
      const key = cat.id+'::'+item;
      const qty = state.qty[key];
      const qtyStr = qty ? ' — '+formatQty(qty, unit) : '';
      const done = state.checked[key] === 2 ? ' ✓' : '';
      lines.push('  • '+item+qtyStr+done);
    });
    lines.push('');
  });
  document.getElementById('export-text').textContent = lines.join('\n');
  document.getElementById('export-modal').classList.add('open');
};

window.copyExport = function() {
  const text = document.getElementById('export-text').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('Lista copiada!')).catch(()=>{});
};

function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function render() {
  const container = document.getElementById('categories-container');
  let totalChecked=0, totalItems=0;

  container.innerHTML = CATEGORIES.map(cat => {
    const baseItems = cat.items;
    const extraItems = (state.extra[cat.id]||[]).map(n=>[n,'un']);
    const allItems = [...baseItems, ...extraItems];
    const checkedCount = allItems.filter(([n])=>state.checked[cat.id+'::'+n]).length;
    totalChecked += checkedCount; totalItems += allItems.length;

    let filtered = allItems;
    if(currentFilter==='selecionados') filtered = allItems.filter(([n])=>state.checked[cat.id+'::'+n]);
    if(currentFilter==='pendentes') filtered = allItems.filter(([n])=>!state.checked[cat.id+'::'+n]);
    if(currentFilter!=='todos' && filtered.length===0) return '';

    const itemsHtml = filtered.map(([item, unit]) => {
      const key = cat.id+'::'+item;
      const checkVal = state.checked[key] || 0;
      const qty = state.qty[key] || getInitial(unit);
      const isExtra = !baseItems.find(([n])=>n===item);

      let checkClass = '', checkContent = '';
      if(checkVal===1){ checkClass='na-lista'; checkContent='✓'; }
      else if(checkVal===2){ checkClass='comprado'; checkContent='✓'; }

      let checkStyle = checkVal===1 ? `background:${cat.color}` : '';
      let labelClass = checkVal===2 ? 'comprado' : '';
      let qtyColor = checkVal===1 ? cat.color : '#ccc';

      const qtyBlock = checkVal===1
        ? `<div class="qty-wrap">
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${cat.id}','${esc(item)}','${unit}',-1)">−</button>
            <span class="qty-val" style="color:${qtyColor}">${formatQty(qty,unit)}</span>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${cat.id}','${esc(item)}','${unit}',1)">+</button>
          </div>`
        : checkVal===2
        ? `<span class="qty-val" style="color:#ccc;min-width:52px;text-align:center;font-size:13px">${formatQty(qty,unit)}</span>`
        : `<span class="qty-dash">—</span>`;

      return `<div class="item-row" onclick="toggleItem('${cat.id}','${esc(item)}','${unit}')">
        <div class="item-check ${checkClass}" style="${checkStyle}">${checkContent}</div>
        <span class="item-label ${labelClass}">${item}</span>
        ${qtyBlock}
        ${isExtra?`<span class="item-del" onclick="event.stopPropagation();deleteItem('${cat.id}','${esc(item)}')">✕</span>`:''}
      </div>`;
    }).join('');

    return `<div class="category-block" style="border:2.5px solid ${cat.color}">
      <div class="cat-header">
        <span class="cat-name" style="color:${cat.textColor}">${cat.label}</span>
        <span class="cat-count">${checkedCount}/${allItems.length}</span>
      </div>
      <div class="cat-body">
        ${itemsHtml}
        <div class="add-row">
          <input class="add-input" id="add-${cat.id}" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addItem('${cat.id}')"/>
          <button class="add-btn" onclick="addItem('${cat.id}')">+ Add</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('progress').textContent = `${totalChecked} de ${totalItems}`;
}

onSnapshot(DOC_REF, (snap) => {
  if(snap.exists()) {
    state = snap.data();
    if(!state.qty) state.qty = {};
    if(!state.extra) state.extra = {};
    if(!state.checked) state.checked = {};
  }
  document.getElementById('sync-label').textContent = 'Sincronizado em tempo real';
  document.getElementById('pulse').classList.remove('offline');
  render();
}, () => {
  document.getElementById('sync-label').textContent = 'Erro de conexão';
  document.getElementById('pulse').classList.add('offline');
});
</script>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
