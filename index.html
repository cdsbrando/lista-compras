<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
  .app { max-width: 600px; margin: 0 auto; padding: 16px; }
  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #ddd; }
  .app-title { font-size: 22px; font-weight: bold; }
  .progress { font-size: 13px; color: #777; }
  .share-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 12px; background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; }
  .share-bar input { flex: 1; font-size: 12px; border: none; background: transparent; color: #888; outline: none; }
  .share-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #aaa; background: #fff; cursor: pointer; white-space: nowrap; }
  .share-btn:hover { background: #f0f0f0; }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #ccc; background: #fff; cursor: pointer; color: #777; }
  .filter-btn.active { border-color: #333; background: #333; color: #fff; }
  .category-block { margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 3px solid; background: #fff; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
  .cat-header-left { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: bold; }
  .cat-count { font-size: 11px; font-weight: normal; opacity: 0.7; }
  .cat-body { padding: 4px 10px 8px; background: #fff; }
  .item-row { display: flex; align-items: center; gap: 8px; padding: 6px 2px; border-bottom: 1px solid #f0f0f0; }
  .item-row:last-child { border-bottom: none; }
  .item-row.checked .item-label { text-decoration: none; opacity: 1; }
  .item-check { width: 24px; height: 24px; border-radius: 5px; border: 2px solid #bbb; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; }
  .item-check.checked { background: #4caf50; border-color: #4caf50; }
  .item-check.checked::after { content: ''; display: block; width: 6px; height: 11px; border: 2.5px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .item-label { flex: 1; font-size: 17px; line-height: 1.3; }
  .qty-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
  .qty-btn:hover { background: #e8e8e8; }
  .qty-btn:disabled { opacity: 0.25; pointer-events: none; }
  .qty-val { min-width: 54px; text-align: center; font-size: 15px; font-weight: 600; color: #333; }
  .qty-dash { min-width: 54px; text-align: center; font-size: 15px; color: #bbb; }
  .item-del { font-size: 14px; color: #ccc; cursor: pointer; padding: 0 3px; opacity: 0; flex-shrink: 0; }
  .item-row:hover .item-del { opacity: 1; }
  .add-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-input { flex: 1; font-size: 13px; padding: 6px 10px; border-radius: 7px; border: 1px solid #ddd; background: #fafafa; color: #222; }
  .add-input:focus { outline: none; border-color: #aaa; }
  .add-btn { font-size: 13px; padding: 6px 12px; border-radius: 7px; border: 1px solid #aaa; background: #fff; cursor: pointer; }
  .add-btn:hover { background: #f0f0f0; }
  .new-week-btn { margin-top: 16px; width: 100%; font-size: 15px; font-weight: bold; padding: 12px; border-radius: 8px; border: none; color: #fff; background: #4caf50; cursor: pointer; }
  .new-week-btn:hover { background: #43a047; }
  .clear-btn { margin-top: 8px; width: 100%; font-size: 13px; padding: 10px; border-radius: 8px; border: 1px solid #e88; color: #c44; background: #fff; cursor: pointer; }
  .clear-btn:hover { background: #fff0f0; }
  .sync-bar { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 11px; color: #999; }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; flex-shrink: 0; }
  .pulse.offline { background: #f44; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 40px; color: #999; font-size: 15px; }

  .c-frutas     { border-color: #F5A623; } .c-frutas     .cat-header { background: #FFF3DC; color: #7A5000; }
  .c-legumes    { border-color: #5BBD72; } .c-legumes    .cat-header { background: #E6F7EB; color: #1E5E2E; }
  .c-proteinas  { border-color: #E05252; } .c-proteinas  .cat-header { background: #FDEAEA; color: #7A1A1A; }
  .c-laticinios { border-color: #5BA3E0; } .c-laticinios .cat-header { background: #E8F3FC; color: #1A4A7A; }
  .c-graos      { border-color: #C2883A; } .c-graos      .cat-header { background: #FAF0E2; color: #6B4210; }
  .c-mercearia  { border-color: #B07BC2; } .c-mercearia  .cat-header { background: #F5EEFA; color: #5A2278; }
  .c-frios      { border-color: #7AC28A; } .c-frios      .cat-header { background: #EAF7EE; color: #225A30; }
  .c-utilidades { border-color: #C2A83A; } .c-utilidades .cat-header { background: #FAF5E2; color: #6B5210; }
  .c-nuts       { border-color: #5BBCD8; } .c-nuts       .cat-header { background: #E5F5FA; color: #135872; }
  .c-temperos   { border-color: #E07A5F; } .c-temperos   .cat-header { background: #FDF0EC; color: #7A2A15; }
  .c-outros     { border-color: #aaa; }    .c-outros     .cat-header { background: #f0f0f0; color: #444; }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="app-title">🛒 Lista de Compras</div>
    <div class="progress" id="progress">Carregando...</div>
  </div>
  <div class="share-bar">
    <input id="share-link" value="" readonly />
    <button class="share-btn" onclick="copyLink()">Copiar link</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('selecionados',this)">Selecionados</button>
    <button class="filter-btn" onclick="setFilter('pendentes',this)">Pendentes</button>
  </div>
  <div id="categories-container"><div class="loading">Conectando...</div></div>
  <button class="new-week-btn" onclick="newWeek()">🛒 Nova semana — zerar lista</button>
  <button class="clear-btn" onclick="clearAll()">Limpar apenas seleção</button>
  <div class="sync-bar"><span class="pulse" id="pulse"></span> <span id="sync-label">Sincronizando...</span></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmp789PKEbh_he7KER_N_l6Riz-Of10j0",
  authDomain: "lista-de-compras-39a87.firebaseapp.com",
  projectId: "lista-de-compras-39a87",
  storageBucket: "lista-de-compras-39a87.firebasestorage.app",
  messagingSenderId: "455986065294",
  appId: "1:455986065294:web:b98cb8a9eebff85b26fedf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "lista", "estado");

const UN = 'un', KG = 'kg', LT = 'L';

const CATEGORIES = [
  { id:'frutas', label:'Frutas', icon:'🍎', cls:'c-frutas', items:[
    ['Abacaxi',UN],['Banana',UN],['Laranja',UN],['Limão',UN],['Limão siciliano',UN],
    ['Maçã',UN],['Mamão',UN],['Mamão papaia',UN],['Melancia',UN],['Mexerica',UN],
    ['Morango',KG],['Uva',KG]
  ]},
  { id:'legumes', label:'Legumes e Verduras', icon:'🥦', cls:'c-legumes', items:[
    ['Abobrinha',UN],['Abóbora',UN],['Alface',UN],['Alho',UN],['Batata',KG],
    ['Berinjela',UN],['Brócolis',UN],['Cebola branca',KG],['Cebola roxa',KG],
    ['Cenoura',KG],['Chuchu',UN],['Couve',UN],['Ervilha congelada',KG],
    ['Ervilha torta',KG],['Gengibre',UN],['Mandioquinha',KG],['Moranga',UN],
    ['Repolho',UN],['Repolho roxo',UN],['Tomate',KG],['Tomate cereja',KG],['Vagem',KG]
  ]},
  { id:'proteinas', label:'Proteínas', icon:'🥩', cls:'c-proteinas', items:[
    ['Acém',KG],['Atum ao natural',UN],['Camarão',KG],['Carne para bife',KG],
    ['Escalopinho de Mignon',KG],['Filé de peito de frango',KG],['Filé de salmão',KG],
    ['Filé de tilápia',KG],['Ovos Brancos',UN],['Posta de atum',KG],['Posta de robalo',KG]
  ]},
  { id:'frios', label:'Frios e Embutidos', icon:'🧀', cls:'c-frios', items:[
    ['Peito de peru',UN],['Presunto',UN],['Queijo prato',UN]
  ]},
  { id:'laticinios', label:'Laticínios', icon:'🥛', cls:'c-laticinios', items:[
    ['Creme de leite lata',UN],['Creme de leite vegetal Nude',UN],['Creme de ricota',UN],
    ['Iogurte grego tradicional',UN],['Iogurte natural desnatado',UN],
    ['Leite semidesnatado zero lactose',LT],['Manteiga',UN],['Margarina com sal',UN],
    ['Margarina sem sal',UN],['Margarina vegana',UN],['Nude de Aveia',LT],
    ['Nude de Proteína (vários sabores)',UN],['Nude Original',LT],
    ['Requeijão cremoso',UN],['Requeijão light zero lactose',UN]
  ]},
  { id:'graos', label:'Grãos, Massas e Cereais', icon:'🌾', cls:'c-graos', items:[
    ['Amido de milho',KG],['Arroz branco',KG],['Arroz integral',KG],
    ['Aveia em flocos',KG],['Aveia flocos finos',KG],['Bifum',UN],
    ['Farinha de panko',UN],['Farinha de trigo',KG],['Farinha sem glúten',KG],
    ['Feijão carioca tipo 1',KG],['Flocão de milho',UN],['Grão de bico',KG],
    ['Lentilha',KG],['Macarrão de sopa',UN],['Macarrão parafuso',UN],
    ['Macarrão sem glúten',UN],['Tapioca',KG]
  ]},
  { id:'mercearia', label:'Mercearia', icon:'🫙', cls:'c-mercearia', items:[
    ['Açúcar branco',KG],['Açúcar de coco',KG],['Açúcar demerara orgânico',KG],
    ['Água com gás',LT],['Alcaparras',UN],['Azeite',LT],['Azeite de dendê',LT],
    ['Azeitonas pretas',UN],['Azeitonas roxas',UN],['Batata palha extra fina',UN],
    ['Café 500g',UN],['Chocolate em pó',UN],['Coco ralado',UN],['Fermento em pó',UN],
    ['Ketchup',UN],['Leite de coco',LT],['Maionese tradicional',UN],
    ['Maionese vegana',UN],['Mel',UN],['Molho de tomate',UN],['Molho inglês',UN],
    ['Molho tailandês',UN],['Mostarda em grãos',UN],['Óleo de coco extra virgem',LT],
    ['Óleo de girassol',LT],['Vinagre balsâmico',LT]
  ]},
  { id:'temperos', label:'Temperos e Especiarias', icon:'🌶️', cls:'c-temperos', items:[
    ['Canela em pó',UN],['Orégano',UN],['Páprica defumada',UN],['Páprica doce',UN],
    ['Pimenta do reino em grãos',UN],['Pimenta do reino em pó',UN],['Sal refinado',KG]
  ]},
  { id:'nuts', label:'Nuts e Secos', icon:'🥜', cls:'c-nuts', items:[
    ['Ameixa seca',KG],['Castanha de caju torrada',KG],['Castanha do Pará',KG],
    ['Damasco',KG],['Damasco seco',KG],['Pistache',KG],['Uva passa preta',KG]
  ]},
  { id:'utilidades', label:'Utilidades e Descartáveis', icon:'🏠', cls:'c-utilidades', items:[
    ['Filme PVC',UN],['Guardanapo pequeno',UN],['Hidrosteril 50ml',UN],
    ['Papel higiênico',UN],['Papel manteiga',UN],['Saquinho freezer',UN],['Toalha de papel',UN]
  ]},
  { id:'outros', label:'Outros', icon:'📝', cls:'c-outros', items:[] },
];

function getStep(u) { return u===KG?100:u===LT?0.5:1; }
function getInitial(u) { return u===KG?100:u===LT?0.5:1; }
function formatQty(v,u) {
  if(u===KG) return v>=1000?(v/1000).toFixed(v%1000===0?0:1)+' kg':v+' g';
  if(u===LT) return parseFloat(v).toFixed(1).replace(/\.0$/,'')+' L';
  return v+' un';
}

let state = { checked:{}, qty:{}, extra:{} };
let currentFilter = 'todos';
let saving = false;

document.getElementById('share-link').value = window.location.href;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(()=>showToast('Link copiado! Mande para sua cozinheira 😊'))
    .catch(()=>showToast('Copie o link da barra acima'));
}

function setFilter(f,btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function saveState() {
  if (saving) return;
  saving = true;
  try {
    await setDoc(DOC_REF, state);
    document.getElementById('sync-label').textContent = 'Sincronizado em tempo real';
    document.getElementById('pulse').classList.remove('offline');
  } catch(e) {
    document.getElementById('sync-label').textContent = 'Erro ao sincronizar';
    document.getElementById('pulse').classList.add('offline');
  }
  saving = false;
}

window.toggleItem = function(catId, item, unit) {
  const key=catId+'::'+item;
  state.checked[key]=!state.checked[key];
  if(state.checked[key]&&!state.qty[key]) state.qty[key]=getInitial(unit);
  saveState(); render();
};

window.changeQty = function(catId, item, unit, dir) {
  const key=catId+'::'+item;
  const step=getStep(unit);
  const cur=state.qty[key]||getInitial(unit);
  let next;
  if(unit===LT) next=Math.max(0.5,parseFloat((parseFloat(cur)+dir*step).toFixed(1)));
  else next=Math.max(step,cur+dir*step);
  state.qty[key]=next;
  if(!state.checked[key]) state.checked[key]=true;
  saveState(); render();
};

window.addItem = function(catId) {
  const input=document.getElementById('add-'+catId);
  if(!input) return;
  const val=input.value.trim();
  if(!val) return;
  if(!state.extra[catId]) state.extra[catId]=[];
  state.extra[catId].push(val);
  input.value='';
  saveState(); render();
};

window.deleteItem = function(catId, item) {
  const key=catId+'::'+item;
  state.extra[catId]=(state.extra[catId]||[]).filter(i=>i!==item);
  delete state.checked[key]; delete state.qty[key];
  saveState(); render();
};

window.newWeek = function() {
  if(!confirm("Iniciar nova semana? Isso vai apagar toda a seleção, quantidades e itens extras adicionados.")) return;
  state.checked={}; state.qty={}; state.extra={};
  saveState(); render();
};

window.clearAll = function() {
  if(!confirm('Limpar toda a seleção e quantidades?')) return;
  state.checked={}; state.qty={};
  saveState(); render();
};

function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function render() {
  const container=document.getElementById('categories-container');
  let totalChecked=0, totalItems=0;

  container.innerHTML=CATEGORIES.map(cat=>{
    const baseItems=cat.items;
    const extraItems=(state.extra[cat.id]||[]).map(n=>[n,UN]);
    const allItems=[...baseItems,...extraItems];
    const checkedCount=allItems.filter(([n])=>state.checked[cat.id+'::'+n]).length;
    totalChecked+=checkedCount; totalItems+=allItems.length;

    let filtered=allItems;
    if(currentFilter==='selecionados') filtered=allItems.filter(([n])=>state.checked[cat.id+'::'+n]);
    if(currentFilter==='pendentes') filtered=allItems.filter(([n])=>!state.checked[cat.id+'::'+n]);
    if(currentFilter!=='todos'&&filtered.length===0) return '';

    const itemsHtml=filtered.map(([item,unit])=>{
      const key=cat.id+'::'+item;
      const isChecked=!!state.checked[key];
      const qty=state.qty[key]||getInitial(unit);
      const isExtra=!baseItems.find(([n])=>n===item);
      const qtyBlock=isChecked
        ?`<div class="qty-wrap">
            <button class="qty-btn" onclick="changeQty('${cat.id}','${esc(item)}','${unit}',-1)">−</button>
            <span class="qty-val">${formatQty(qty,unit)}</span>
            <button class="qty-btn" onclick="changeQty('${cat.id}','${esc(item)}','${unit}',1)">+</button>
          </div>`
        :`<div class="qty-wrap">
            <button class="qty-btn" disabled>−</button>
            <span class="qty-dash">—</span>
            <button class="qty-btn" onclick="changeQty('${cat.id}','${esc(item)}','${unit}',1)">+</button>
          </div>`;
      return `<div class="item-row ${isChecked?'checked':''}">
        <div class="item-check ${isChecked?'checked':''}" onclick="toggleItem('${cat.id}','${esc(item)}','${unit}')"></div>
        <span class="item-label">${item}</span>
        ${qtyBlock}
        ${isExtra?`<span class="item-del" onclick="deleteItem('${cat.id}','${esc(item)}')">✕</span>`:''}
      </div>`;
    }).join('');

    return `<div class="category-block ${cat.cls}">
      <div class="cat-header">
        <div class="cat-header-left"><span style="font-size:17px">${cat.icon}</span> ${cat.label}</div>
        <span class="cat-count">${checkedCount}/${allItems.length}</span>
      </div>
      <div class="cat-body">
        ${itemsHtml}
        <div class="add-row">
          <input class="add-input" id="add-${cat.id}" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addItem('${cat.id}')"/>
          <button class="add-btn" onclick="addItem('${cat.id}')">+ Add</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('progress').textContent=`${totalChecked} de ${totalItems} selecionados`;
}

onSnapshot(DOC_REF, (snap) => {
  if (snap.exists()) {
    state = snap.data();
    if (!state.qty) state.qty = {};
    if (!state.extra) state.extra = {};
  }
  document.getElementById('sync-label').textContent = 'Sincronizado em tempo real';
  document.getElementById('pulse').classList.remove('offline');
  render();
}, (error) => {
  document.getElementById('sync-label').textContent = 'Erro de conexão';
  document.getElementById('pulse').classList.add('offline');
});
</script>
</body>
</html>
